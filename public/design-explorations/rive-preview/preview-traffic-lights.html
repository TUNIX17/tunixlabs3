<!DOCTYPE html>
<html>
<head>
<title>Traffic Lights</title>
<style>
body { background:#f5f5f2; margin:0; display:grid; place-items:center; height:100vh; font-family:monospace; color:#0a0a0a; }
.frame { background:#0a0a0a; padding:24px; border-radius:6px; }
canvas { display:block; }
#status { margin-top:16px; font-size:10px; text-align:center; max-width:600px; word-break:break-all; }
</style>
</head>
<body>
<div class="frame"><canvas id="c" width="120" height="32"></canvas></div>
<div id="status">loading...</div>
<script src="https://unpkg.com/@rive-app/canvas@2.17.3"></script>
<script>
(function() {
  var statusEl = document.getElementById('status');
  if (typeof rive === 'undefined' || !rive.Rive) {
    statusEl.textContent = 'error: rive UMD global not found';
    return;
  }
  try {
    var r = new rive.Rive({
      src: './traffic-lights.riv',
      canvas: document.getElementById('c'),
      autoplay: true,
      artboard: 'TrafficLights',
      animations: ['LivePulse'],
      onLoad: function() {
        var arts = r.artboardNames || 'n/a';
        var anims = r.animationNames || 'n/a';
        var playing = r.playingAnimationNames || 'n/a';
        statusEl.textContent = 'loaded · art:' + JSON.stringify(arts) + ' anims:' + JSON.stringify(anims) + ' playing:' + JSON.stringify(playing);
      },
      onLoadError: function(e) { statusEl.textContent = 'error: ' + String(e); }
    });
    window.__rive = r;
  } catch (err) {
    statusEl.textContent = 'exception: ' + String(err);
  }
})();
</script>
</body>
</html>
