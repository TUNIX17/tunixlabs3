<!DOCTYPE html>
<html>
<head>
<title>Typing Cursor</title>
<style>
body { background:#f5f5f2; margin:0; padding:40px; font-family:monospace; color:#0a0a0a; }
.frame { background:#0a0a0a; padding:12px; border-radius:4px; max-width:300px; margin:0 auto; }
canvas { display:block; }
.controls { max-width:300px; margin:20px auto; }
input[type=range] { width:100%; }
#status { text-align:center; font-size:10px; margin-top:16px; word-break:break-all; max-width:600px; margin-left:auto; margin-right:auto; }
</style>
</head>
<body>
<div class="frame"><canvas id="c" width="200" height="40"></canvas></div>
<div class="controls">
  <label>scrollPos: <span id="val">0</span></label>
  <input type="range" id="slider" min="0" max="100" value="0" step="1">
</div>
<div id="status">loading...</div>
<script src="https://unpkg.com/@rive-app/canvas@2.17.3"></script>
<script>
(function() {
  var statusEl = document.getElementById('status');
  if (typeof rive === 'undefined' || !rive.Rive) {
    statusEl.textContent = 'error: rive UMD global not found';
    return;
  }
  try {
    var r = new rive.Rive({
      src: './typing-cursor.riv',
      canvas: document.getElementById('c'),
      autoplay: true,
      artboard: 'TypingCursor',
      animations: ['Blink'],
      onLoad: function() {
        var anims = r.animationNames || 'n/a';
        var playing = r.playingAnimationNames || 'n/a';
        statusEl.textContent = 'loaded · anims:' + JSON.stringify(anims) + ' playing:' + JSON.stringify(playing);
      },
      onLoadError: function(e) { statusEl.textContent = 'error: ' + String(e); }
    });
    window.__rive = r;
    document.getElementById('slider').addEventListener('input', function(e) {
      var v = parseFloat(e.target.value);
      document.getElementById('val').textContent = v;
      // Drive the ScrollSlide animation time directly via scrub as fallback if SM wiring not present
      try { r.scrub('ScrollSlide', v / 100); r.drawFrame(); } catch (err) { /* ignore */ }
    });
  } catch (err) {
    statusEl.textContent = 'exception: ' + String(err);
  }
})();
</script>
</body>
</html>
