<!DOCTYPE html>
<html>
<head>
<title>Rive Pulse Test</title>
<style>
body { background:#f5f5f2; margin:0; display:grid; place-items:center; height:100vh; font-family:monospace; color:#0a0a0a; }
#status { margin-top:20px; font-size:12px; }
</style>
</head>
<body>
<canvas id="c" width="200" height="200"></canvas>
<div id="status">loading...</div>
<script src="https://unpkg.com/@rive-app/canvas@2.17.3"></script>
<script>
(function() {
  var statusEl = document.getElementById('status');
  if (typeof rive === 'undefined' || !rive.Rive) {
    statusEl.textContent = 'error: rive UMD global not found';
    return;
  }
  try {
    new rive.Rive({
      src: './pulse-test.riv',
      canvas: document.getElementById('c'),
      autoplay: true,
      artboard: 'PulseTest',
      onLoad: function() { statusEl.textContent = 'loaded ok'; },
      onLoadError: function(e) { statusEl.textContent = 'error: ' + String(e); }
    });
  } catch (err) {
    statusEl.textContent = 'exception: ' + String(err);
  }
})();
</script>
</body>
</html>
