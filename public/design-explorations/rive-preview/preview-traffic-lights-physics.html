<!DOCTYPE html>
<html>
<head>
<title>Traffic Lights — Physics Drop</title>
<style>
body { background:#f5f5f2; margin:0; display:grid; place-items:center; height:100vh; font-family:monospace; color:#0a0a0a; }
.frame { background:#0a0a0a; padding:24px; border-radius:6px; }
canvas { display:block; }
#status { margin-top:16px; font-size:11px; text-align:center; }
button { margin-top:12px; padding:8px 16px; cursor:pointer; font-family:monospace; }
</style>
</head>
<body>
<div class="frame"><canvas id="c" width="120" height="32"></canvas></div>
<div id="status">loading...</div>
<button onclick="replay()">Replay bounce</button>
<script src="https://unpkg.com/@rive-app/canvas@2.17.3"></script>
<script>
var riveInstance;
(function() {
  var statusEl = document.getElementById('status');
  if (typeof rive === 'undefined' || !rive.Rive) {
    statusEl.textContent = 'error: rive UMD global not found';
    return;
  }
  riveInstance = new rive.Rive({
    src: './traffic-lights-physics.riv',
    canvas: document.getElementById('c'),
    autoplay: true,
    artboard: 'TrafficLightsPhysics',
    animations: ['DropBounce', 'LivePulse'],
    onLoad: function() {
      statusEl.textContent = 'loaded · physics bounce + live pulse';
    },
    onLoadError: function(e) { statusEl.textContent = 'error: ' + String(e); }
  });
  window.__rive = riveInstance;
})();
function replay() {
  if (riveInstance) {
    riveInstance.stop();
    riveInstance.play(['DropBounce', 'LivePulse']);
  }
}
</script>
</body>
</html>
