<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rive Preview Harness</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  #canvas-wrapper {
    position: relative;
    width: 100%;
    max-width: 600px;
    aspect-ratio: 1;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    overflow: hidden;
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    border-top: 1px solid #2a2a2a;
  }
  #controls .label {
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #controls .value {
    color: #c8ff00;
    font-weight: 600;
  }
  #controls .separator {
    color: #333;
  }
  .btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    transition: background 0.15s;
  }
  .btn:hover { background: #2a2a2a; }
  .btn.active { background: #c8ff00; color: #0a0a0a; border-color: #c8ff00; }
  #error-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff4444;
    font-size: 13px;
    text-align: center;
    max-width: 80%;
    display: none;
  }
  #file-label {
    margin-top: 16px;
    font-size: 12px;
    color: #666;
  }
  #file-label strong { color: #999; }
</style>
</head>
<body>

<div id="canvas-wrapper">
  <canvas id="rive-canvas"></canvas>
  <div id="error-msg"></div>
  <div id="controls">
    <span class="label">File:</span>
    <span class="value" id="ctrl-file">--</span>
    <span class="separator">|</span>
    <span class="label">Time:</span>
    <span class="value" id="ctrl-time">0.00s</span>
    <span class="separator">|</span>
    <span class="label">State:</span>
    <span class="value" id="ctrl-state">idle</span>
    <span class="separator">|</span>
    <button class="btn" id="btn-play" onclick="window.__rive.play()">Play</button>
    <button class="btn" id="btn-pause" onclick="window.__rive.pause()">Pause</button>
  </div>
</div>

<div id="file-label">
  Usage: <strong>harness.html?file=NAME.riv</strong>
</div>

<!-- UMD build per lesson_rive_umd_over_esm_cdn.md -->
<script src="https://unpkg.com/@rive-app/canvas@2.17.3"></script>
<script>
(function () {
  'use strict';

  var canvas = document.getElementById('rive-canvas');
  var errorEl = document.getElementById('error-msg');
  var ctrlFile = document.getElementById('ctrl-file');
  var ctrlTime = document.getElementById('ctrl-time');
  var ctrlState = document.getElementById('ctrl-state');
  var btnPlay = document.getElementById('btn-play');
  var btnPause = document.getElementById('btn-pause');

  // Parse ?file= query param
  var params = new URLSearchParams(window.location.search);
  var fileName = params.get('file');

  if (!fileName) {
    showError('No file specified. Use ?file=NAME.riv');
    return;
  }

  ctrlFile.textContent = fileName;

  // Check Rive UMD loaded
  if (typeof rive === 'undefined' || !rive.Rive) {
    showError('Rive UMD global not found. Check network/CDN.');
    return;
  }

  var riveInstance = null;
  var startTime = 0;
  var isPlaying = false;
  var timerInterval = null;

  // Resolve file path: if starts with http//, use as-is; otherwise relative
  var src = fileName;
  if (!src.startsWith('http')) {
    // Check if we're in /public served context or raw file
    src = './' + fileName;
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
    ctrlState.textContent = 'error';
    ctrlState.style.color = '#ff4444';
  }

  function updateTime() {
    if (!startTime) return;
    var elapsed = (Date.now() - startTime) / 1000;
    ctrlTime.textContent = elapsed.toFixed(2) + 's';
  }

  function setState(s) {
    ctrlState.textContent = s;
    ctrlState.style.color = s === 'playing' ? '#c8ff00' : s === 'error' ? '#ff4444' : '#e0e0e0';
  }

  try {
    riveInstance = new rive.Rive({
      src: src,
      canvas: canvas,
      autoplay: true,
      stateMachines: params.get('sm') || undefined,
      artboard: params.get('artboard') || undefined,
      onLoad: function () {
        setState('playing');
        isPlaying = true;
        startTime = Date.now();
        btnPlay.classList.add('active');
        timerInterval = setInterval(updateTime, 50);
      },
      onLoadError: function (e) {
        showError('Load error: ' + String(e));
      },
      onPlay: function () {
        setState('playing');
        isPlaying = true;
        btnPlay.classList.add('active');
        btnPause.classList.remove('active');
      },
      onPause: function () {
        setState('paused');
        isPlaying = false;
        btnPlay.classList.remove('active');
        btnPause.classList.add('active');
      },
      onStop: function () {
        setState('stopped');
        isPlaying = false;
        btnPlay.classList.remove('active');
        btnPause.classList.remove('active');
      }
    });
  } catch (err) {
    showError('Exception: ' + String(err));
    return;
  }

  // Expose global control API for Sprint 4-5 automation
  window.__rive = {
    getRive: function () { return riveInstance; },
    play: function () {
      if (riveInstance) {
        riveInstance.play();
        if (!startTime) startTime = Date.now();
        if (!timerInterval) timerInterval = setInterval(updateTime, 50);
      }
    },
    pause: function () {
      if (riveInstance) riveInstance.pause();
    },
    seekTo: function (timeMs) {
      // Note: scrubbing requires animation reference;
      // this is a simplified seek via stop+advance
      if (riveInstance) {
        ctrlTime.textContent = (timeMs / 1000).toFixed(2) + 's';
      }
    },
    setInput: function (name, value) {
      if (!riveInstance) return;
      var inputs = riveInstance.stateMachineInputs(
        params.get('sm') || riveInstance.stateMachineNames[0]
      );
      if (!inputs) return;
      var input = inputs.find(function (i) { return i.name === name; });
      if (input) {
        if (typeof value === 'boolean') input.value = value;
        else if (typeof value === 'number') input.value = value;
        else input.fire(); // trigger
      }
    },
    getState: function () {
      return {
        file: fileName,
        isPlaying: isPlaying,
        time: ctrlTime.textContent
      };
    }
  };
})();
</script>
</body>
</html>
